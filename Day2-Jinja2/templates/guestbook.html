<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Flask 簡易留言板</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .message-box { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>📝 簡易留言板</h2>

    <!-- 留言輸入表單 -->
    <form action="/" method="POST">
        <div class="form-group">
            <label for="username">你的名字：</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="message">留言內容：</label>
            <textarea id="message" name="message" rows="4" required></textarea>
        </div>
        <button type="submit">送出留言</button>
    </form>

    <hr>

    <h3>💬 所有留言</h3>
    <div>
        {% for msg in messages %}
            <div class="message-box">
                <strong>{{ msg.name }}</strong> 說：
                <p>{{ msg.content }}</p>
            </div>
        {% else %}
            <p>目前沒有任何留言。</p>
        {% endfor %}
    </div>

</body>
</html>
